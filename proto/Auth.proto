syntax = "proto3";
import "google/protobuf/wrappers.proto";
package Auth;

enum UserStatus {
    USER_STATUS_UNDEFINED = 0;
    USER_STATUS_DEFAULT_USER = 1;
    USER_STATUS_ORGANIZER = 2;
    USER_STATUS_MOD_ADMIN = 3;
    USER_STATUS_SUPER_ADMIN = 4;
}

message RegistrationRequest {
    int64 discord_id = 1;
    string discord_nickname = 2;
    string lobby_nickname = 3;
}

message RegistrationResponse {
    bool success = 1;
    string message = 2;
    google.protobuf.Int64Value user_id = 3;
}

message UpdateLobbyNicknameRequest {
    int64 user_id = 1;
    string new_nickname = 2;
}

message UpdateLobbyNicknameResponse {
    bool success = 1;
    string message = 2;
}

service AuthService {
    rpc Register(RegistrationRequest) returns (RegistrationResponse);
    rpc UpdateLobbyNickname(UpdateLobbyNicknameRequest) returns (UpdateLobbyNicknameResponse);
}